version: "3"

# Host-specific tasks live in each host's own taskfile.yml and are included
# here under their respective namespaces, e.g.:
#   task mainpc:switch   task t580:build
includes:
  mainpc:
    taskfile: ./modules/hosts/mainPC/taskfile.yml
    dir: .
  t580:
    taskfile: ./modules/hosts/t580/taskfile.yml
    dir: .

tasks:
  default:
    desc: List available tasks
    cmd: task --list
    silent: true

  nix:check:
    desc: Evaluate the flake and check for errors
    cmd: nix flake check

  nix:format:
    desc: Format all Nix files with alejandra
    cmd: find . -name '*.nix' -print0 | xargs -0 alejandra

  nix:update:
    desc: Update all flake inputs
    cmd: sudo nix flake update

  nix:gc:
    desc: Remove ALL old system generations and run garbage collection
    cmds:
    - sudo nix-env --profile /nix/var/nix/profiles/system --delete-generations old
    - sudo nix-collect-garbage -d
    - sudo nix store optimise

  nix:gc:user:
    desc: Garbage collect only user profile generations
    cmd: nix-collect-garbage -d

  nix:gc:old:
    desc: Delete all but the last 3 system generations
    cmds:
    - sudo nix-env --profile /nix/var/nix/profiles/system --delete-generations +3
    - sudo nix-collect-garbage

  nix:generations:
    desc: List system generations
    cmd: sudo nix-env --profile /nix/var/nix/profiles/system --list-generations

  nix:rollback:
    desc: Roll back to the previous system generation
    cmd: sudo nixos-rebuild switch --rollback

  nix:repl:
    desc: Open a nix repl with the flake loaded
    cmd: nix repl --expr 'builtins.getFlake (toString ./.)'

  # ── Standalone Home Manager (Ubuntu / WSL) ──────────────────────────
  standalone:switch:ubuntu:
    desc: Apply Home Manager configuration on Ubuntu
    cmd: nix run nixpkgs#home-manager -- switch --flake '.#ubuntu'

  standalone:switch:wsl:
    desc: Apply Home Manager configuration on WSL
    cmd: nix run nixpkgs#home-manager -- switch --flake '.#wsl'

  standalone:build:ubuntu:
    desc: Build (dry-run) Home Manager configuration for Ubuntu
    cmd: nix run nixpkgs#home-manager -- build --flake '.#ubuntu'

  standalone:build:wsl:
    desc: Build (dry-run) Home Manager configuration for WSL
    cmd: nix run nixpkgs#home-manager -- build --flake '.#wsl'

  standalone:gc:
    desc: Delete old Home Manager generations and run garbage collection (no sudo needed)
    cmds:
    - nix-collect-garbage -d
    - nix store optimise

  dump:config:
    desc: Dump kde plasma configuration to a nix file
    cmd: nix run github:nix-community/plasma-manager -- > ./tmp/after.nix
