version: "3"

vars:
  HOST: t580

tasks:
  switch:
    desc: Build and switch to the NixOS configuration
    cmd: sudo nixos-rebuild switch --flake '.#{{.HOST}}'

  boot:
    desc: Build and set as boot entry — no switch
    cmd: sudo nixos-rebuild boot --flake '.#{{.HOST}}'

  test:
    desc: Build and activate temporarily — reverts on reboot
    cmd: sudo nixos-rebuild test --flake '.#{{.HOST}}'

  build:
    desc: Build the configuration without activating
    cmd: nixos-rebuild build --flake '.#{{.HOST}}'

  diff:
    desc: Show package diff between current and new build
    cmd: nix build '.#nixosConfigurations.{{.HOST}}.config.system.build.toplevel' --no-link --print-out-paths | xargs -I{} nvd diff /run/current-system {}
