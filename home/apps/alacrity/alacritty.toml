# Font configuration — matches Ghostty
[font]
normal = { family = "CaskaydiaCove Nerd Font", style = "Regular" }
bold = { family = "CaskaydiaCove Nerd Font", style = "Bold" }
italic = { family = "CaskaydiaCove Nerd Font", style = "Italic" }
bold_italic = { family = "CaskaydiaCove Nerd Font", style = "Bold Italic" }
size = 12.0

# Colors — Gruvbox Material Dark (matches Ghostty theme)
[colors.primary]
background = "#282828"
foreground = "#d4be98"

[colors.normal]
black = "#282828"
red = "#ea6962"
green = "#a9b665"
yellow = "#d8a657"
blue = "#7daea3"
magenta = "#d3869b"
cyan = "#89b482"
white = "#d4be98"

[colors.bright]
black = "#5a524c"
red = "#ea6962"
green = "#a9b665"
yellow = "#d8a657"
blue = "#7daea3"
magenta = "#d3869b"
cyan = "#89b482"
white = "#d4be98"

# Window — matches Ghostty maximize + opacity
[window]
startup_mode = "Maximized"
padding = { x = 10, y = 10 }
decorations = "None"
opacity = 0.95
dynamic_padding = false

# Cursor — matches Ghostty (block + blink)
[cursor]
style = "Block"

# Selection — matches Ghostty copy-on-select
[selection]
save_to_clipboard = true

# Performance
[scrolling]
history = 40000
multiplier = 3

# Key bindings
[keyboard]
bindings = [
    { key = "V", mods = "Control|Shift", action = "Paste" },
    { key = "C", mods = "Control|Shift", action = "Copy" },
    # Toggle vi mode
    { key = "Space", mods = "Control|Shift", action = "ToggleViMode" },
    # Vi mode navigation
    { key = "Escape", mode = "Vi", action = "ClearSelection" },
    { key = "I", mode = "Vi", action = "ToggleViMode" },
    { key = "Y", mode = "Vi", action = "Copy" },
    { key = "V", mode = "Vi", action = "ToggleNormalSelection" },
    { key = "V", mods = "Shift", mode = "Vi", action = "ToggleLineSelection" },
    { key = "V", mods = "Control", mode = "Vi", action = "ToggleBlockSelection" },
    # Fullscreen toggle
    { key = "F11", action = "ToggleFullscreen" },
    { key = "Return", mods = "Alt", action = "ToggleFullscreen" },
]
