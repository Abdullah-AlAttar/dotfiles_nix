"$schema" = 'https://starship.rs/config-schema.json'

format = """
[оӮ¶](fg:color_orange)\
$os\
$username\
[оӮ°](fg:color_orange bg:color_yellow)\
$directory\
[оӮ°](fg:color_yellow bg:color_aqua)\
$git_branch\
$git_status\
[оӮ°](fg:color_aqua bg:color_blue)\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$bun\
$php\
$java\
$kotlin\
$haskell\
$python\
[оӮ°](fg:color_blue bg:color_bg3)\
$nix_shell\
$kubernetes\
$docker_context\
$direnv\
$conda\
[оӮ°](fg:color_bg3 bg:color_purple)\
$time\
$status\
$jobs\
[оӮҙ ](fg:color_purple)\
$cmd_duration\
$line_break$character"""

palette = 'gruvbox_dark'

command_timeout = 500

[palettes.gruvbox_dark]
color_fg0 = '#fbf1c7'
color_bg1 = '#3c3836'
color_bg3 = '#665c54'
color_blue = '#458588'
color_aqua = '#689d6a'
color_green = '#98971a'
color_orange = '#d65d0e'
color_purple = '#b16286'
color_red = '#cc241d'
color_yellow = '#d79921'

[os]
disabled = false
style = "bg:color_orange fg:color_fg0"

[os.symbols]
Windows = "у°ҚІ"
Ubuntu = "у°•Ҳ"
SUSE = ""
Raspbian = "у°җҝ"
Mint = "у°Јӯ"
Macos = "у°Җө"
Manjaro = ""
Linux = "у°ҢҪ"
Gentoo = "у°ЈЁ"
Fedora = "у°Јӣ"
Alpine = ""
Amazon = ""
Android = ""
AOSC = ""
Arch = "у°ЈҮ"
Artix = "у°ЈҮ"
EndeavourOS = ""
CentOS = ""
Debian = "у°Јҡ"
Redhat = "уұ„ӣ"
RedHatEnterprise = "уұ„ӣ"
Pop = ""

[username]
show_always = true
style_user = "bg:color_orange fg:color_fg0"
style_root = "bg:color_orange fg:color_fg0"
format = '[ $user ]($style)'

[directory]
style = "fg:color_bg1 bg:color_yellow"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = " "
"Music" = "у°қҡ "
"Pictures" = " "
"Developer" = "у°ІӢ "

[git_branch]
symbol = ""
style = "bg:color_aqua"
format = '[[ $symbol $branch ](fg:color_fg0 bg:color_aqua)]($style)'

[git_status]
style = "bg:color_aqua"
format = '[[($all_status$ahead_behind )](fg:color_fg0 bg:color_aqua)]($style)'

[nodejs]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[bun]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[c]
symbol = " "
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[cpp]
symbol = " "
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[rust]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[golang]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[php]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[java]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[kotlin]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[haskell]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[python]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version)(\(#$virtualenv\)) ](fg:color_fg0 bg:color_blue)]($style)'

[kubernetes]
disabled = false
symbol = "вҳё "
style = "bg:color_bg3"
format = '[[ $symbol$context( \($namespace\)) ](fg:color_fg0 bg:color_bg3)]($style)'
contexts = []

[docker_context]
symbol = ""
style = "bg:color_bg3"
format = '[[ $symbol( $context) ](fg:#83a598 bg:color_bg3)]($style)'

[direnv]
disabled = false
symbol = "у°ҢӘ "
style = "fg:color_fg0 bg:color_bg3"
format = '[$symbol]($style)'

[conda]
style = "bg:color_bg3"
format = '[[ $symbol( $environment) ](fg:#83a598 bg:color_bg3)]($style)'

[nix_shell]
disabled = false
symbol = "пҢ“ "
style = "bg:color_bg3"
format = '[[ $symbol$state( $name) ](fg:color_fg0 bg:color_bg3)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:color_purple"
format = '[[  $time ](fg:color_fg0 bg:color_purple)]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[вқҜ](bold fg:color_green)'
error_symbol = '[вқҜ](bold fg:color_red)'
vimcmd_symbol = '[вқ®](bold fg:color_green)'
vimcmd_replace_one_symbol = '[-](bold fg:color_purple)'
vimcmd_replace_symbol = '[--](bold fg:color_purple)'
vimcmd_visual_symbol = '[вқҜ](bold fg:color_yellow)'

[cmd_duration]
show_milliseconds = true
format = " in $duration "
style = "fg:color_fg0"
disabled = false
show_notifications = true
min_time_to_notify = 45000

[status]
disabled = false
symbol = "вң—"
pipestatus = false
style = "fg:color_red bg:color_purple"
format = '[ $symbol$status ]($style)'

[jobs]
disabled = false
symbol = "в—Ҷ "
style = "fg:color_fg0 bg:color_purple"
format = '[ $symbol$number ]($style)'
